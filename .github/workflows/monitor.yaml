name: Website Health Checker

on:
  schedule:
    - cron: '0 0 * * *' # This runs every 8:00 am PH time
  workflow_dispatch: # This allows you to run it manually from the website

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run monitor script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: Website Health Checker.py
